<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 88" fill="none">
  <title>ARAF Standard</title>

  <!-- Centred icon block -->
  <!-- Row 1 -->
  <rect x="21"  y="0"  width="17" height="17" fill="#A88644"/>
  <rect x="41"  y="0"  width="17" height="17" fill="none" stroke="#0d0d0b" stroke-width="2"/>
  <rect x="61"  y="0"  width="17" height="17" fill="none" stroke="#0d0d0b" stroke-width="2"/>

  <!-- Row 2 -->
  <rect x="21"  y="20" width="17" height="17" fill="none" stroke="#0d0d0b" stroke-width="2"/>
  <rect x="41"  y="20" width="17" height="17" fill="#A88644"/>
  <rect x="61"  y="20" width="17" height="17" fill="none" stroke="#0d0d0b" stroke-width="2"/>

  <!-- Thin rule below icon -->
  <line x1="21" y1="50" x2="79" y2="50" stroke="#A88644" stroke-width="1"/>

  <!-- Wordmark centred -->
  <text
    x="50"
    y="68"
    text-anchor="middle"
    font-family="'Libre Baskerville', Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.8"
    fill="#0d0d0b"
  >ARAF</text>

  <!-- Descriptor centred -->
  <text
    x="50"
    y="82"
    text-anchor="middle"
    font-family="'DM Mono', 'Courier New', monospace"
    font-size="7.5"
    font-weight="400"
    letter-spacing="2.4"
    fill="#7a7a72"
  >STANDARD</text>

</svg>
