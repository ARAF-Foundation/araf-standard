<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <title>ARAF Standard Governance Lifecycle</title>
  <desc>The governance lifecycle of the ARAF standard. Three maturation stages (Founder-Led, Ecosystem Development, Institutional-Scale) run horizontally. The perpetual maintenance cycle (version publication, methodology updates, interpretive guidance, reassessment triggers, certification flow) runs vertically as a continuous loop. Governance of the standard and operation of the certification ecosystem are related but distinct. From ARAF v2.1, 2026.</desc>
  <defs>
    <style>.serif{font-family:Georgia,'Times New Roman',serif}.mono{font-family:'Courier New',Courier,monospace}</style>
  </defs>

  <rect width="960" height="620" fill="#f7f5f0"/>
  <rect x="20" y="20" width="920" height="580" fill="#ffffff" stroke="#d4d0c8" stroke-width="1"/>

  <!-- Registration marks -->
  <line x1="20" y1="26" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="20" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="26" x2="940" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="20" x2="946" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="20" y1="594" x2="20" y2="600" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="600" x2="20" y2="600" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="594" x2="940" y2="600" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="600" x2="946" y2="600" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- Header -->
  <text x="480" y="48" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="3" class="mono">ARAF STANDARD GOVERNANCE LIFECYCLE</text>
  <line x1="40" y1="54" x2="920" y2="54" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- ══════════════════════════════════════ -->
  <!-- TOP SECTION: GOVERNANCE MATURATION STAGES -->
  <!-- ══════════════════════════════════════ -->

  <text x="480" y="72" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="2" class="mono">GOVERNANCE MATURATION TRAJECTORY</text>

  <!-- Stage dividers -->
  <line x1="352" y1="80" x2="352" y2="244" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="660" y1="80" x2="660" y2="244" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- STAGE 1: FOUNDER-LED -->
  <rect x="40" y="80" width="308" height="28" fill="#0d0d0b"/>
  <rect x="40" y="80" width="308" height="3" fill="#A88644"/>
  <text x="50" y="93" font-size="7" fill="#A88644" letter-spacing="1.5" class="mono">STAGE 1 — CURRENT</text>
  <text x="336" y="93" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.4)" class="mono">Founder-Led</text>
  <text x="50" y="104" font-size="8.5" font-weight="bold" fill="white" class="serif">Founder-Led Governance</text>

  <rect x="40" y="108" width="308" height="136" fill="#fdfaf5" stroke="#e8e4db" stroke-width="1"/>
  <rect x="40" y="108" width="3" height="136" fill="#A88644"/>

  <text x="52" y="126" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Authority holder:</text>
  <text x="52" y="139" font-size="8" fill="#3a3a35" class="mono">ARAF Standards Authority Ltd /</text>
  <text x="52" y="151" font-size="8" fill="#3a3a35" class="mono">originating author</text>

  <line x1="52" y1="158" x2="336" y2="158" stroke="#e8e4db" stroke-width="0.75"/>

  <text x="52" y="172" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Functions covered:</text>
  <text x="52" y="185" font-size="7.5" fill="#3a3a35" class="mono">· Version publication + version history</text>
  <text x="52" y="197" font-size="7.5" fill="#3a3a35" class="mono">· Methodology maintenance</text>
  <text x="52" y="209" font-size="7.5" fill="#3a3a35" class="mono">· Interpretive guidance (governance notes)</text>
  <text x="52" y="221" font-size="7.5" fill="#3a3a35" class="mono">· Stewardship of public documentation</text>
  <text x="52" y="235" font-size="7" fill="#A88644" font-style="italic" class="mono">CC BY 4.0 — openly licensed</text>

  <!-- Transition arrow 1→2 -->
  <text x="352" y="170" text-anchor="middle" font-size="18" fill="#A88644">→</text>
  <text x="352" y="184" text-anchor="middle" font-size="6.5" fill="#7a7a72" class="mono">Ecosystem</text>
  <text x="352" y="194" text-anchor="middle" font-size="6.5" fill="#7a7a72" class="mono">growth</text>

  <!-- STAGE 2: ECOSYSTEM DEVELOPMENT -->
  <rect x="356" y="80" width="300" height="28" fill="#3a3a35"/>
  <rect x="356" y="80" width="300" height="3" fill="#A88644"/>
  <text x="366" y="93" font-size="7" fill="#A88644" letter-spacing="1.5" class="mono">STAGE 2 — NEAR-TERM</text>
  <text x="644" y="93" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.4)" class="mono">Ecosystem Development</text>
  <text x="366" y="104" font-size="8.5" font-weight="bold" fill="white" class="serif">Ecosystem Development</text>

  <rect x="356" y="108" width="300" height="136" fill="#fdfaf5" stroke="#e8e4db" stroke-width="1"/>
  <rect x="356" y="108" width="3" height="136" fill="#A88644"/>

  <text x="368" y="126" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Authority structure:</text>
  <text x="368" y="139" font-size="8" fill="#3a3a35" class="mono">Originating author + institutional</text>
  <text x="368" y="151" font-size="8" fill="#3a3a35" class="mono">advisory group input</text>

  <line x1="368" y1="158" x2="644" y2="158" stroke="#e8e4db" stroke-width="0.75"/>

  <text x="368" y="172" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Added functions:</text>
  <text x="368" y="185" font-size="7.5" fill="#3a3a35" class="mono">· Technical contributor methodology feedback</text>
  <text x="368" y="197" font-size="7.5" fill="#3a3a35" class="mono">· Institutional advisory group on revisions</text>
  <text x="368" y="209" font-size="7.5" fill="#3a3a35" class="mono">· Formal amendment + consultation process</text>
  <text x="368" y="221" font-size="7.5" fill="#3a3a35" class="mono">· Certification partner methodology feedback</text>
  <text x="368" y="235" font-size="7" fill="#7a7a72" font-style="italic" class="mono">Triggered by assessor ecosystem development</text>

  <!-- Transition arrow 2→3 -->
  <text x="660" y="170" text-anchor="middle" font-size="18" fill="#A88644">→</text>
  <text x="660" y="184" text-anchor="middle" font-size="6.5" fill="#7a7a72" class="mono">Institutional</text>
  <text x="660" y="194" text-anchor="middle" font-size="6.5" fill="#7a7a72" class="mono">adoption</text>

  <!-- STAGE 3: INSTITUTIONAL SCALE -->
  <rect x="664" y="80" width="256" height="28" fill="#7a7a72"/>
  <rect x="664" y="80" width="256" height="3" fill="#A88644"/>
  <text x="674" y="93" font-size="7" fill="#A88644" letter-spacing="1.5" class="mono">STAGE 3 — LONG-TERM</text>
  <text x="908" y="93" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.4)" class="mono">Institutional Scale</text>
  <text x="674" y="104" font-size="8.5" font-weight="bold" fill="white" class="serif">Institutional-Scale Governance</text>

  <rect x="664" y="108" width="256" height="136" fill="#fdfaf5" stroke="#e8e4db" stroke-width="1"/>
  <rect x="664" y="108" width="3" height="136" fill="#A88644"/>

  <text x="676" y="126" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Authority structure:</text>
  <text x="676" y="139" font-size="8" fill="#3a3a35" class="mono">Multi-stakeholder governance</text>
  <text x="676" y="151" font-size="8" fill="#3a3a35" class="mono">body with defined composition</text>

  <line x1="676" y1="158" x2="908" y2="158" stroke="#e8e4db" stroke-width="0.75"/>

  <text x="676" y="172" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">Governance features:</text>
  <text x="676" y="185" font-size="7.5" fill="#3a3a35" class="mono">· Defined meeting cadence</text>
  <text x="676" y="197" font-size="7.5" fill="#3a3a35" class="mono">· Public reporting obligations</text>
  <text x="676" y="209" font-size="7.5" fill="#3a3a35" class="mono">· Consultation requirements for changes</text>
  <text x="676" y="221" font-size="7.5" fill="#3a3a35" class="mono">· Institutional input on methodology</text>
  <text x="676" y="235" font-size="7" fill="#7a7a72" font-style="italic" class="mono">Objective: transparency, not complexity</text>

  <!-- Separator -->
  <line x1="40" y1="250" x2="920" y2="250" stroke="#d4d0c8" stroke-width="1"/>

  <!-- ══════════════════════════════════════ -->
  <!-- BOTTOM SECTION: PERPETUAL MAINTENANCE CYCLE -->
  <!-- ══════════════════════════════════════ -->

  <text x="480" y="270" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="2" class="mono">PERPETUAL MAINTENANCE CYCLE — ACTIVE AT ALL STAGES</text>

  <!-- 5 cycle steps in a horizontal flow -->
  <!-- Step widths: each ~160px, starting x=40 -->

  <!-- STEP 1: VERSION PUBLICATION -->
  <rect x="40" y="280" width="154" height="130" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="40" y="280" width="154" height="3" fill="#A88644"/>
  <text x="117" y="298" text-anchor="middle" font-size="7" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">VERSION PUBLICATION</text>
  <line x1="52" y1="304" x2="182" y2="304" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="52" y="320" font-size="7.5" fill="#3a3a35" class="mono">Version number</text>
  <text x="52" y="333" font-size="7.5" fill="#3a3a35" class="mono">Publication date</text>
  <text x="52" y="346" font-size="7.5" fill="#3a3a35" class="mono">Changelog documented</text>
  <text x="52" y="359" font-size="7.5" fill="#3a3a35" class="mono">Version history updated</text>
  <text x="52" y="375" font-size="7" fill="#A88644" font-style="italic" class="mono">Stable + citable</text>
  <text x="52" y="387" font-size="7" fill="#7a7a72" class="mono">Publicly accessible</text>
  <text x="52" y="399" font-size="7" fill="#7a7a72" class="mono">No access restrictions</text>

  <!-- Arrow 1→2 -->
  <line x1="194" y1="345" x2="206" y2="345" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="206,341 214,345 206,349" fill="#A88644"/>

  <!-- STEP 2: METHODOLOGY MAINTENANCE -->
  <rect x="214" y="280" width="154" height="130" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="214" y="280" width="154" height="3" fill="#A88644"/>
  <text x="291" y="298" text-anchor="middle" font-size="7" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">METHODOLOGY UPKEEP</text>
  <line x1="226" y1="304" x2="356" y2="304" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="226" y="320" font-size="7.5" fill="#3a3a35" class="mono">Dimensional definitions</text>
  <text x="226" y="333" font-size="7.5" fill="#3a3a35" class="mono">Scoring logic</text>
  <text x="226" y="346" font-size="7.5" fill="#3a3a35" class="mono">Multiplier thresholds</text>
  <text x="226" y="359" font-size="7.5" fill="#3a3a35" class="mono">Certification tier boundaries</text>
  <text x="226" y="375" font-size="7" fill="#A88644" font-style="italic" class="mono">No informal changes</text>
  <text x="226" y="387" font-size="7" fill="#7a7a72" class="mono">Internal coherence</text>
  <text x="226" y="399" font-size="7" fill="#7a7a72" class="mono">preserved throughout</text>

  <!-- Arrow 2→3 -->
  <line x1="368" y1="345" x2="380" y2="345" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="380,341 388,345 380,349" fill="#A88644"/>

  <!-- STEP 3: INTERPRETIVE GUIDANCE -->
  <rect x="388" y="280" width="184" height="130" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="388" y="280" width="184" height="3" fill="#A88644"/>
  <text x="480" y="298" text-anchor="middle" font-size="7" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">INTERPRETIVE GUIDANCE</text>
  <line x1="400" y1="304" x2="560" y2="304" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="400" y="320" font-size="7.5" fill="#3a3a35" class="mono">Published governance notes</text>
  <text x="400" y="333" font-size="7.5" fill="#3a3a35" class="mono">Applied consistently by all</text>
  <text x="400" y="346" font-size="7.5" fill="#3a3a35" class="mono">accredited assessors</text>
  <text x="400" y="362" font-size="7" fill="#7a7a72" class="mono">Standard maintainer does not hold</text>
  <text x="400" y="374" font-size="7" fill="#7a7a72" class="mono">a privileged assessment position</text>
  <text x="400" y="389" font-size="7" fill="#A88644" font-style="italic" class="mono">Independence principle applies</text>
  <text x="400" y="401" font-size="7" fill="#A88644" font-style="italic" class="mono">equally to all participants</text>

  <!-- Arrow 3→4 -->
  <line x1="572" y1="345" x2="584" y2="345" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="584,341 592,345 584,349" fill="#A88644"/>

  <!-- STEP 4: MATERIAL CHANGE PROCESS -->
  <rect x="592" y="280" width="154" height="130" fill="#fdf8f0" stroke="#A88644" stroke-width="1"/>
  <rect x="592" y="280" width="154" height="3" fill="#A88644"/>
  <text x="669" y="298" text-anchor="middle" font-size="7" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">MATERIAL CHANGE</text>
  <line x1="604" y1="304" x2="734" y2="304" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="604" y="320" font-size="7.5" fill="#3a3a35" class="mono">Formal amendment process</text>
  <text x="604" y="333" font-size="7.5" fill="#3a3a35" class="mono">Backward-compatibility review</text>
  <text x="604" y="346" font-size="7.5" fill="#3a3a35" class="mono">Transition guidance issued</text>
  <text x="604" y="362" font-size="7" fill="#A88644" class="mono">Breaks comparability?</text>
  <text x="604" y="374" font-size="7" fill="#A88644" class="mono">Explicit justification required</text>
  <text x="604" y="389" font-size="7" fill="#7a7a72" font-style="italic" class="mono">Institutional usability</text>
  <text x="604" y="401" font-size="7" fill="#7a7a72" font-style="italic" class="mono">must be preserved</text>

  <!-- Arrow 4→5 -->
  <line x1="746" y1="345" x2="758" y2="345" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="758,341 766,345 758,349" fill="#A88644"/>

  <!-- STEP 5: CERTIFICATION FLOW-THROUGH -->
  <rect x="766" y="280" width="154" height="130" fill="#0d0d0b" stroke="#0d0d0b"/>
  <rect x="766" y="280" width="154" height="3" fill="#A88644"/>
  <text x="843" y="298" text-anchor="middle" font-size="7" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">CERTIFICATION FLOW</text>
  <line x1="778" y1="304" x2="908" y2="304" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>
  <text x="778" y="320" font-size="7.5" fill="rgba(255,255,255,0.7)" class="mono">Changes flow through</text>
  <text x="778" y="333" font-size="7.5" fill="rgba(255,255,255,0.7)" class="mono">to certification ecosystem</text>
  <text x="778" y="349" font-size="7" fill="rgba(168,134,68,0.7)" class="mono">Certified organisations</text>
  <text x="778" y="361" font-size="7" fill="rgba(168,134,68,0.7)" class="mono">subject to reassessment</text>
  <text x="778" y="373" font-size="7" fill="rgba(168,134,68,0.7)" class="mono">obligations</text>
  <text x="778" y="389" font-size="7" fill="rgba(255,255,255,0.35)" class="mono">Standard defines method</text>
  <text x="778" y="401" font-size="7" fill="rgba(255,255,255,0.35)" class="mono">Certifiers run the practice</text>

  <!-- Return arrow (cycle) below -->
  <line x1="843" y1="410" x2="843" y2="428" stroke="#d4d0c8" stroke-width="1"/>
  <line x1="843" y1="428" x2="117" y2="428" stroke="#d4d0c8" stroke-width="1"/>
  <line x1="117" y1="428" x2="117" y2="416" stroke="#d4d0c8" stroke-width="1"/>
  <polygon points="113,416 117,408 121,416" fill="#d4d0c8"/>
  <text x="480" y="441" text-anchor="middle" font-size="7" fill="#7a7a72" font-style="italic" class="mono">continuous cycle — perpetual at all governance stages</text>

  <!-- ══════════════════════════════════════ -->
  <!-- GOVERNANCE PRINCIPLES FOOTER BAND -->
  <!-- ══════════════════════════════════════ -->
  <line x1="40" y1="450" x2="920" y2="450" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="40" y="450" width="880" height="70" fill="#fdf8f0"/>
  <rect x="40" y="450" width="3" height="70" fill="#A88644"/>

  <text x="56" y="467" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="2" class="mono">FOUR GOVERNANCE PRINCIPLES</text>

  <text x="56" y="484" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">1. Version Discipline</text>
  <text x="160" y="484" font-size="7.5" fill="#3a3a35" class="mono">Each version clearly identified, dated, distinguishable</text>

  <text x="56" y="498" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">2. Public Transparency</text>
  <text x="176" y="498" font-size="7.5" fill="#3a3a35" class="mono">Version, governance status, citation format: publicly visible at all times</text>

  <text x="490" y="484" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">3. Methodological Consistency</text>
  <text x="660" y="484" font-size="7.5" fill="#3a3a35" class="mono">Changes never informal or ambiguous</text>

  <text x="490" y="498" font-size="7.5" font-weight="bold" fill="#0d0d0b" class="mono">4. Institutional Usability</text>
  <text x="636" y="498" font-size="7.5" fill="#3a3a35" class="mono">Standard must remain usable by boards, regulators, insurers, investors, assessors</text>

  <text x="56" y="512" font-size="7" fill="#A88644" font-style="italic" class="mono">Standard governance does not constitute assessor accreditation, certification issuance, or any statutory authority.</text>

  <!-- Caption -->
  <line x1="40" y1="528" x2="920" y2="528" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="480" y="546" text-anchor="middle" font-size="9" fill="#3a3a35" font-style="italic" class="serif">A governance standard that cannot explain how it is governed invites the same criticism</text>
  <text x="480" y="561" text-anchor="middle" font-size="9" fill="#3a3a35" font-style="italic" class="serif">ARAF levels at organisations with governance claims but no governance infrastructure.</text>
  <text x="480" y="582" text-anchor="middle" font-size="7.5" fill="#7a7a72" class="mono">Martin, C. Trust Architecture: Making Autonomous Systems Bankable · ARAF v2.1, 2026 · trust-architecture.com</text>

</svg>
