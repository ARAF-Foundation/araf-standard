<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <title>Engineering Telemetry vs Governance Telemetry</title>
  <desc>Side-by-side comparison of engineering telemetry and governance telemetry. Engineering telemetry measures system performance: latency, throughput, error rates, uptime, model accuracy, drift metrics, availability. Governance telemetry measures whether governance was exercised: decision authority records, escalation events, scope adherence logs, AIOC meeting records, approval records, anomaly response records, accountability attribution. A system that generates extensive performance metrics but no governance records has operational monitoring without operational accountability. Engineering telemetry cannot substitute for governance telemetry at any evidence tier. From ARAF EIS-01 v3.0, 2026.</desc>
  <defs>
    <style>.serif{font-family:Georgia,'Times New Roman',serif}.mono{font-family:'Courier New',Courier,monospace}</style>
  </defs>

  <rect width="960" height="520" fill="#f7f5f0"/>
  <rect x="20" y="20" width="920" height="480" fill="#ffffff" stroke="#d4d0c8" stroke-width="1"/>

  <!-- Registration marks -->
  <line x1="20" y1="26" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="20" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="26" x2="940" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="20" x2="946" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="20" y1="494" x2="20" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="500" x2="20" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="494" x2="940" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="500" x2="946" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- Header -->
  <text x="480" y="48" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="3" class="mono">ENGINEERING TELEMETRY vs GOVERNANCE TELEMETRY</text>
  <line x1="40" y1="54" x2="920" y2="54" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- Intro -->
  <text x="480" y="73" text-anchor="middle" font-size="9" fill="#3a3a35" font-style="italic" class="serif">Both are necessary. Neither substitutes for the other. The difference determines what institutional audiences can rely upon.</text>

  <!-- Centre divider -->
  <line x1="480" y1="84" x2="480" y2="420" stroke="#e8e4db" stroke-width="1.5"/>
  <text x="480" y="80" text-anchor="middle" font-size="8" fill="#d4d0c8" class="mono">vs</text>

  <!-- ── LEFT: ENGINEERING TELEMETRY ── -->
  <rect x="40" y="88" width="424" height="40" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="40" y="88" width="424" height="3" fill="#7a7a72"/>
  <text x="252" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#0d0d0b" class="serif">Engineering Telemetry</text>

  <text x="252" y="136" text-anchor="middle" font-size="9" fill="#7a7a72" font-style="italic" class="serif">Records whether the system is performing as designed</text>
  <line x1="56" y1="144" x2="448" y2="144" stroke="#e8e4db" stroke-width="0.75"/>

  <!-- Engineering items — greyed out treatment -->
  <rect x="56" y="152" width="408" height="26" fill="white" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="165" font-size="8.5" fill="#7a7a72" class="serif">Latency</text>
  <text x="200" y="165" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— response time per request</text>

  <rect x="56" y="181" width="408" height="26" fill="#fafaf8" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="194" font-size="8.5" fill="#7a7a72" class="serif">Throughput</text>
  <text x="200" y="194" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— decisions processed per period</text>

  <rect x="56" y="210" width="408" height="26" fill="white" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="223" font-size="8.5" fill="#7a7a72" class="serif">Error rates</text>
  <text x="200" y="223" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— exceptions and failure modes</text>

  <rect x="56" y="239" width="408" height="26" fill="#fafaf8" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="252" font-size="8.5" fill="#7a7a72" class="serif">Uptime / availability</text>
  <text x="200" y="252" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— system operational status</text>

  <rect x="56" y="268" width="408" height="26" fill="white" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="281" font-size="8.5" fill="#7a7a72" class="serif">Model accuracy</text>
  <text x="200" y="281" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— output quality against benchmark</text>

  <rect x="56" y="297" width="408" height="26" fill="#fafaf8" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="310" font-size="8.5" fill="#7a7a72" class="serif">Drift metrics</text>
  <text x="200" y="310" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— output distribution shift over time</text>

  <rect x="56" y="326" width="408" height="26" fill="white" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="72" y="339" font-size="8.5" fill="#7a7a72" class="serif">Resource utilisation</text>
  <text x="200" y="339" font-size="7.5" fill="#b0aca4" font-style="italic" class="serif">— compute, memory, cost</text>

  <!-- Engineering verdict box -->
  <rect x="56" y="366" width="408" height="44" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="260" y="383" text-anchor="middle" font-size="8.5" fill="#7a7a72" font-style="italic" class="serif">Answers: Is the system working?</text>
  <text x="260" y="400" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7a7a72" class="serif">Does not answer: Is governance being exercised?</text>

  <!-- ── RIGHT: GOVERNANCE TELEMETRY ── -->
  <rect x="496" y="88" width="424" height="40" fill="#0d0d0b" stroke="#0d0d0b"/>
  <rect x="496" y="88" width="424" height="3" fill="#A88644"/>
  <text x="708" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="white" class="serif">Governance Telemetry</text>

  <text x="708" y="136" text-anchor="middle" font-size="9" fill="#7a7a72" font-style="italic" class="serif">Records whether governance was actually exercised</text>
  <line x1="512" y1="144" x2="904" y2="144" stroke="#3a3a35" stroke-width="0.75"/>

  <!-- Governance items — gold accent treatment -->
  <rect x="512" y="152" width="408" height="26" fill="#1a1a17" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="152" width="3" height="26" fill="#A88644"/>
  <text x="524" y="165" font-size="8.5" fill="white" class="serif">Decision authority record</text>
  <text x="660" y="165" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— who was authorised to act</text>

  <rect x="512" y="181" width="408" height="26" fill="#111110" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="181" width="3" height="26" fill="#A88644"/>
  <text x="524" y="194" font-size="8.5" fill="white" class="serif">Escalation event log</text>
  <text x="660" y="194" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— what triggered review</text>

  <rect x="512" y="210" width="408" height="26" fill="#1a1a17" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="210" width="3" height="26" fill="#A88644"/>
  <text x="524" y="223" font-size="8.5" fill="white" class="serif">Scope adherence record</text>
  <text x="660" y="223" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— did the system stay within bounds</text>

  <rect x="512" y="239" width="408" height="26" fill="#111110" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="239" width="3" height="26" fill="#A88644"/>
  <text x="524" y="252" font-size="8.5" fill="white" class="serif">AIOC meeting records</text>
  <text x="660" y="252" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— governance oversight exercised</text>

  <rect x="512" y="268" width="408" height="26" fill="#1a1a17" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="268" width="3" height="26" fill="#A88644"/>
  <text x="524" y="281" font-size="8.5" fill="white" class="serif">Approval records</text>
  <text x="660" y="281" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— human sign-off at decision points</text>

  <rect x="512" y="297" width="408" height="26" fill="#111110" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="297" width="3" height="26" fill="#A88644"/>
  <text x="524" y="310" font-size="8.5" fill="white" class="serif">Anomaly response record</text>
  <text x="660" y="310" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— what happened when rules were breached</text>

  <rect x="512" y="326" width="408" height="26" fill="#1a1a17" stroke="#3a3a35" stroke-width="0.75"/>
  <rect x="512" y="326" width="3" height="26" fill="#A88644"/>
  <text x="524" y="339" font-size="8.5" fill="white" class="serif">Accountability attribution</text>
  <text x="660" y="339" font-size="7.5" fill="#7a7a72" font-style="italic" class="serif">— named owner of each governance action</text>

  <!-- Governance verdict box -->
  <rect x="512" y="366" width="408" height="44" fill="#1a1a17" stroke="#3a3a35" stroke-width="0.75"/>
  <text x="716" y="383" text-anchor="middle" font-size="8.5" fill="#7a7a72" font-style="italic" class="serif">Answers: Was governance exercised?</text>
  <text x="716" y="400" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#A88644" class="serif">Required for institutional reliance at every tier.</text>

  <!-- Footer rule + key principle -->
  <line x1="40" y1="422" x2="920" y2="422" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="480" y="442" text-anchor="middle" font-size="9.5" fill="#0d0d0b" font-weight="bold" font-style="italic" class="serif">A system with extensive performance metrics but no governance records has monitoring without accountability.</text>
  <line x1="40" y1="455" x2="920" y2="455" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="480" y="471" text-anchor="middle" font-size="8" fill="#7a7a72" class="serif">Engineering telemetry does not satisfy governance requirements at any ARAF evidence tier. The two are related but not interchangeable.</text>
  <text x="900" y="492" text-anchor="end" font-size="7" fill="#b0aca4" class="mono">EIS-01 v3.0 · ARAF v3.0 · 2026 · Institute for Autonomous Governance Pty Ltd</text>
</svg>
