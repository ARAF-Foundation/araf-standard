<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720" viewBox="0 0 900 720">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Barlow+Condensed:wght@600;700;800;900&amp;display=swap');
    </style>
    <linearGradient id="certGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FC38A" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#C8A84B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4FC38A" stop-opacity="0.15"/>
