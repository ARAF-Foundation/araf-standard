  <text x="40" y="86" font-family="'Space Mono', monospace" font-size="8.5" fill="#8899AA" letter-spacing="0.5">Governance that cannot travel through markets cannot scale. Especially useful for insurers and enterprise buyers.</text>
  <line x1="40" y1="98" x2="860" y2="98" stroke="#C8A84B" stroke-width="0.5" opacity="0.35"/>

  <!-- ── LEFT COLUMN: Lifecycle steps ── -->

  <!-- STEP 1: System Deployment -->
  <rect x="40" y="116" width="360" height="60" fill="#4A556812" stroke="#4A556844" stroke-width="1"/>
  <rect x="40" y="116" width="2" height="60" fill="#4A5568"/>
  <!-- Step number badge -->
  <rect x="48" y="122" width="28" height="18" fill="#4A556822" stroke="#4A556844" stroke-width="0.5"/>
  <text x="62" y="134" font-family="'Space Mono', monospace" font-size="8" fill="#4A5568" text-anchor="middle">01</text>
  <text x="86" y="132" font-family="'Space Mono', monospace" font-size="8" fill="#4A5568" letter-spacing="2">SYSTEM DEPLOYMENT</text>
  <text x="86" y="148" font-family="'Barlow Condensed', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8" letter-spacing="0.5">SYSTEM DEPLOYMENT</text>
  <text x="86" y="162" font-family="'Space Mono', monospace" font-size="7.5" fill="#8899AA">Autonomous system enters operational environment</text>
  <text x="86" y="171" font-family="'Space Mono', monospace" font-size="7.5" fill="#4A5568">Model / Agent / Decision Engine deployed</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="176" x2="220" y2="192" stroke="#4A8FE8" stroke-width="1.2" opacity="0.6"/>
  <polygon points="216,192 224,192 220,200" fill="#4A8FE8" opacity="0.6"/>

  <!-- STEP 2: ARAF Assessment -->
