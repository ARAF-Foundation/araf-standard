  <text x="86" y="216" font-family="'Space Mono', monospace" font-size="8" fill="#4A8FE8" letter-spacing="2">ARAF ASSESSMENT</text>
  <text x="86" y="232" font-family="'Barlow Condensed', sans-serif" font-size="14" font-weight="700" fill="#F0F4F8" letter-spacing="0.5">ARAF ASSESSMENT</text>
