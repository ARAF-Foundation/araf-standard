<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="diagram-title diagram-desc">
  <title id="diagram-title">Framework Interpretation Model</title>
  <desc id="diagram-desc">Diagram showing how a single ARAF governance profile and GBI composite score are interpreted by boards, insurers, investors, regulators, and enterprise procurement teams through different institutional decision lenses.</desc>

  <defs>
    <style>
      .mono {
        font-family: DM Mono, monospace;
      }

      .ink {
        fill: #0d0d0b;
      }

      .ink-mid {
        fill: #3a3a35;
      }

      .ink-muted {
        fill: #7a7a72;
      }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#f7f5f0" />
  <rect x="40" y="36" width="1120" height="548" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />

  <text class="mono ink-muted" x="600" y="62" font-size="12" letter-spacing="2.8" text-anchor="middle">FRAMEWORK INTERPRETATION MODEL</text>
  <line x1="70" y1="76" x2="1130" y2="76" stroke="#d4d0c8" stroke-width="1" />

  <g id="source-block">
    <text class="mono" x="600" y="114" font-size="11" letter-spacing="2.2" text-anchor="middle" fill="#A88644">FRAMEWORK OUTPUT</text>
    <rect x="410" y="126" width="380" height="104" rx="8" fill="#ede9e0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="410" y="126" width="380" height="3" fill="#A88644" />
    <text class="mono ink" x="600" y="172" font-size="28" font-weight="700" text-anchor="middle">ARAF Governance Profile</text>
    <text class="mono ink-mid" x="600" y="201" font-size="22" font-weight="700" text-anchor="middle">GBI Composite Score</text>
  </g>

  <g id="interpretation-band">
    <rect x="180" y="278" width="840" height="90" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="180" y="278" width="840" height="2.5" fill="#A88644" />
    <text class="mono ink" x="600" y="319" font-size="22" font-weight="700" text-anchor="middle">Institutional Interpretation Layer</text>
    <text class="mono ink-muted" x="600" y="343" font-size="12" text-anchor="middle">Common methodology, different decision lenses</text>
  </g>

  <g id="connectors" stroke="#7a7a72" stroke-width="1.5" fill="none">
    <line x1="600" y1="230" x2="600" y2="278" />
    <line x1="600" y1="368" x2="600" y2="398" />
    <line x1="180" y1="398" x2="1060" y2="398" />
    <line x1="180" y1="398" x2="180" y2="430" />
    <line x1="400" y1="398" x2="400" y2="430" />
    <line x1="620" y1="398" x2="620" y2="430" />
    <line x1="840" y1="398" x2="840" y2="430" />
    <line x1="1060" y1="398" x2="1060" y2="430" />
  </g>

  <g id="audience-boards">
    <rect x="80" y="430" width="200" height="122" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="80" y="430" width="200" height="2.5" fill="#A88644" />
    <text class="mono ink" x="180" y="471" font-size="24" font-weight="700" text-anchor="middle">Boards</text>
    <text class="mono ink-muted" x="180" y="496" font-size="12" text-anchor="middle">Oversight and</text>
    <text class="mono ink-muted" x="180" y="514" font-size="12" text-anchor="middle">governance assurance</text>
  </g>

  <g id="audience-insurers">
    <rect x="300" y="430" width="200" height="122" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="300" y="430" width="200" height="2.5" fill="#A88644" />
    <text class="mono ink" x="400" y="471" font-size="24" font-weight="700" text-anchor="middle">Insurers</text>
    <text class="mono ink-muted" x="400" y="496" font-size="12" text-anchor="middle">Underwriting and</text>
    <text class="mono ink-muted" x="400" y="514" font-size="12" text-anchor="middle">claims defensibility</text>
  </g>

  <g id="audience-investors">
    <rect x="520" y="430" width="200" height="122" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="520" y="430" width="200" height="2.5" fill="#A88644" />
    <text class="mono ink" x="620" y="471" font-size="24" font-weight="700" text-anchor="middle">Investors</text>
    <text class="mono ink-muted" x="620" y="496" font-size="12" text-anchor="middle">Durability and</text>
    <text class="mono ink-muted" x="620" y="514" font-size="12" text-anchor="middle">institutional investability</text>
  </g>

  <g id="audience-regulators">
    <rect x="740" y="430" width="200" height="122" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="740" y="430" width="200" height="2.5" fill="#A88644" />
    <text class="mono ink" x="840" y="471" font-size="24" font-weight="700" text-anchor="middle">Regulators</text>
    <text class="mono ink-muted" x="840" y="496" font-size="12" text-anchor="middle">Accountability and</text>
    <text class="mono ink-muted" x="840" y="514" font-size="12" text-anchor="middle">supervisory visibility</text>
  </g>

  <g id="audience-enterprise-procurement">
    <rect x="960" y="430" width="200" height="122" rx="8" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1.5" />
    <rect x="960" y="430" width="200" height="2.5" fill="#A88644" />
    <text class="mono ink" x="1060" y="467" font-size="20" font-weight="700" text-anchor="middle">Enterprise</text>
    <text class="mono ink" x="1060" y="491" font-size="20" font-weight="700" text-anchor="middle">Procurement</text>
    <text class="mono ink-muted" x="1060" y="514" font-size="12" text-anchor="middle">Vendor assurance</text>
    <text class="mono ink-muted" x="1060" y="532" font-size="12" text-anchor="middle">before deployment</text>
  </g>
</svg>
