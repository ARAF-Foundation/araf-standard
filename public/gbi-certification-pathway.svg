<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <title>From Governance Assessment to Institutional Reliance</title>
  <desc>Four-zone flow diagram showing how ARAF six-dimensional governance assessment produces a GBI score, which maps to a certification tier, which becomes an institutional reliance signal for boards, insurers, investors, regulators, and enterprise procurement teams. From ARAF v3.0, 2026.</desc>
  <defs>
    <style>.serif{font-family:Georgia,'Times New Roman',serif}.mono{font-family:'Courier New',Courier,monospace}</style>
  </defs>

  <rect width="960" height="520" fill="#f7f5f0"/>
  <rect x="20" y="20" width="920" height="480" fill="#ffffff" stroke="#d4d0c8" stroke-width="1"/>

  <!-- Registration marks -->
  <line x1="20" y1="26" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="20" x2="20" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="26" x2="940" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="20" x2="946" y2="20" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="20" y1="494" x2="20" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="14" y1="500" x2="20" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="494" x2="940" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>
  <line x1="940" y1="500" x2="946" y2="500" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- Header -->
  <text x="480" y="48" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="3" class="mono">FROM GOVERNANCE ASSESSMENT TO INSTITUTIONAL RELIANCE</text>
  <line x1="40" y1="54" x2="920" y2="54" stroke="#d4d0c8" stroke-width="0.75"/>

  <!-- ── ZONE 1: SIX DIMENSIONAL ASSESSMENT ── -->
  <rect x="40" y="66" width="196" height="330" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="40" y="66" width="196" height="3" fill="#7a7a72"/>
  <text x="138" y="84" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="1.5" class="mono">ZONE 1</text>
  <text x="138" y="100" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Six-Dimensional</text>
  <text x="138" y="114" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Assessment</text>

  <!-- D items -->
  <rect x="52" y="126" width="172" height="22" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="126" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="141" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D1</text>
  <text x="78" y="141" font-size="9" fill="#0d0d0b" class="serif">Autonomy Gradient</text>

  <rect x="52" y="152" width="172" height="22" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="152" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="167" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D2</text>
  <text x="78" y="167" font-size="9" fill="#0d0d0b" class="serif">Data Sensitivity</text>

  <rect x="52" y="178" width="172" height="22" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="178" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="193" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D3</text>
  <text x="78" y="193" font-size="9" fill="#0d0d0b" class="serif">Contract Infrastructure</text>

  <rect x="52" y="204" width="172" height="22" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="204" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="219" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D4</text>
  <text x="78" y="219" font-size="9" fill="#0d0d0b" class="serif">Liability Architecture</text>

  <rect x="52" y="230" width="172" height="22" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="230" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="245" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D5</text>
  <text x="78" y="245" font-size="9" fill="#0d0d0b" class="serif">Commercial Leverage</text>

  <rect x="52" y="256" width="172" height="22" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="0.75"/>
  <rect x="52" y="256" width="3"   height="22" fill="#A88644"/>
  <text x="63" y="271" font-size="7.5" font-weight="bold" fill="#A88644" class="mono">D6</text>
  <text x="78" y="271" font-size="9" fill="#0d0d0b" class="serif">Adaptive Stability</text>

  <line x1="52" y1="288" x2="224" y2="288" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="138" y="304" text-anchor="middle" font-size="7.5" fill="#7a7a72" class="mono">Dimensional profile</text>
  <text x="138" y="317" text-anchor="middle" font-size="7.5" fill="#7a7a72" class="mono">+ multiplier logic</text>
  <text x="138" y="335" text-anchor="middle" font-size="7" font-style="italic" fill="#A88644" class="mono">Produces governance</text>
  <text x="138" y="347" text-anchor="middle" font-size="7" font-style="italic" fill="#A88644" class="mono">actionability</text>
  <text x="138" y="365" text-anchor="middle" font-size="7" fill="#7a7a72" class="mono">Accredited assessor</text>
  <text x="138" y="377" text-anchor="middle" font-size="7" fill="#7a7a72" class="mono">conducts assessment</text>

  <!-- Arrow Z1→Z2 -->
  <line x1="236" y1="231" x2="256" y2="231" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="256,227 264,231 256,235" fill="#A88644"/>

  <!-- ── ZONE 2: GBI COMPOSITE ── -->
  <rect x="264" y="66" width="172" height="330" fill="#0d0d0b" stroke="#0d0d0b"/>
  <rect x="264" y="66" width="172" height="3" fill="#A88644"/>
  <text x="350" y="84" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">ZONE 2</text>
  <text x="350" y="104" text-anchor="middle" font-size="9.5" font-weight="bold" fill="white" class="serif">Governance</text>
  <text x="350" y="118" text-anchor="middle" font-size="9.5" font-weight="bold" fill="white" class="serif">Benchmark Index</text>

  <!-- GBI score -->
  <text x="350" y="160" text-anchor="middle" font-size="36" font-weight="bold" fill="white" class="serif">1.0</text>
  <text x="350" y="176" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.4)" class="serif">to</text>
  <text x="350" y="200" text-anchor="middle" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.45)" class="serif">5.0</text>

  <line x1="276" y1="218" x2="424" y2="218" stroke="rgba(255,255,255,0.08)" stroke-width="0.75"/>

  <!-- Score bar -->
  <rect x="276" y="228" width="148" height="5" fill="rgba(255,255,255,0.08)" rx="2"/>
  <rect x="276" y="228" width="42"  height="5" fill="#A88644" rx="2"/>
  <text x="350" y="244" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.7)" class="mono">lower = stronger posture</text>

  <line x1="276" y1="254" x2="424" y2="254" stroke="rgba(255,255,255,0.06)" stroke-width="0.75"/>

  <text x="350" y="272" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.45)" class="mono">Produces</text>
  <text x="350" y="286" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.45)" class="mono">comparability</text>
  <text x="350" y="308" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.25)" font-style="italic" class="mono">The GBI compresses</text>
  <text x="350" y="320" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.25)" font-style="italic" class="mono">the dimensional</text>
  <text x="350" y="332" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.25)" font-style="italic" class="mono">profile. It does not</text>
  <text x="350" y="344" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.25)" font-style="italic" class="mono">replace it.</text>
  <text x="350" y="370" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.45)" class="mono">Technical safety asks</text>
  <text x="350" y="382" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.45)" class="mono">whether it works.</text>
  <text x="350" y="394" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.45)" class="mono">The GBI asks whether</text>
  <text x="350" y="406" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.45)" class="mono">accountability can be</text>
  <text x="350" y="418" text-anchor="middle" font-size="7" fill="rgba(168,134,68,0.45)" class="mono">demonstrated.</text>

  <!-- Arrow Z2→Z3 -->
  <line x1="436" y1="231" x2="456" y2="231" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="456,227 464,231 456,235" fill="#A88644"/>

  <!-- ── ZONE 3: CERTIFICATION TIER ── -->
  <rect x="464" y="66" width="172" height="330" fill="#fdf8f0" stroke="#A88644" stroke-width="1"/>
  <rect x="464" y="66" width="172" height="3" fill="#A88644"/>
  <text x="550" y="84" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">ZONE 3</text>
  <text x="550" y="100" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Certification</text>
  <text x="550" y="114" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Tier</text>

  <!-- Assessed -->
  <rect x="476" y="126" width="148" height="46" fill="white" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="476" y="126" width="148" height="2" fill="#7a7a72"/>
  <text x="550" y="142" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="1.5" class="mono">ARAF ASSESSED</text>
  <text x="550" y="156" text-anchor="middle" font-size="8.5" fill="#0d0d0b" class="serif">Evaluation complete</text>
  <text x="550" y="167" text-anchor="middle" font-size="7" fill="#7a7a72" class="mono">Any GBI score</text>

  <!-- Compliant -->
  <rect x="476" y="178" width="148" height="46" fill="#f0e8d6" stroke="#A88644" stroke-width="1"/>
  <rect x="476" y="178" width="148" height="2" fill="#A88644"/>
  <text x="550" y="194" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">ARAF COMPLIANT</text>
  <text x="550" y="208" text-anchor="middle" font-size="8.5" fill="#0d0d0b" class="serif">Institutional threshold met</text>
  <text x="550" y="219" text-anchor="middle" font-size="7" fill="#A88644" font-weight="bold" class="mono">GBI ≤ 2.50</text>

  <!-- Certified -->
  <rect x="476" y="230" width="148" height="46" fill="#0d0d0b" stroke="#A88644" stroke-width="1.5"/>
  <rect x="476" y="230" width="148" height="3" fill="#A88644"/>
  <text x="550" y="248" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#A88644" letter-spacing="1.5" class="mono">ARAF CERTIFIED</text>
  <text x="550" y="262" text-anchor="middle" font-size="8.5" fill="white" class="serif">Full agentic bankability</text>
  <text x="550" y="273" text-anchor="middle" font-size="7" fill="#A88644" font-weight="bold" class="mono">GBI ≤ 1.75</text>

  <line x1="476" y1="286" x2="624" y2="286" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="550" y="304" text-anchor="middle" font-size="7.5" fill="#3a3a35" class="mono">Produces</text>
  <text x="550" y="318" text-anchor="middle" font-size="7.5" fill="#3a3a35" class="mono">communicability</text>
  <text x="550" y="340" text-anchor="middle" font-size="7" font-style="italic" fill="#7a7a72" class="mono">Certification is the</text>
  <text x="550" y="352" text-anchor="middle" font-size="7" font-style="italic" fill="#7a7a72" class="mono">market-facing layer.</text>
  <text x="550" y="364" text-anchor="middle" font-size="7" font-style="italic" fill="#7a7a72" class="mono">The GBI is methodology.</text>
  <text x="550" y="376" text-anchor="middle" font-size="7" font-style="italic" fill="#7a7a72" class="mono">Certification is market</text>
  <text x="550" y="388" text-anchor="middle" font-size="7" font-style="italic" fill="#7a7a72" class="mono">infrastructure.</text>

  <!-- Arrow Z3→Z4 -->
  <line x1="636" y1="231" x2="656" y2="231" stroke="#A88644" stroke-width="1.5"/>
  <polygon points="656,227 664,231 656,235" fill="#A88644"/>

  <!-- ── ZONE 4: INSTITUTIONAL RELIANCE ── -->
  <rect x="664" y="66" width="256" height="330" fill="#f7f5f0" stroke="#d4d0c8" stroke-width="1"/>
  <rect x="664" y="66" width="256" height="3" fill="#0d0d0b"/>
  <text x="792" y="84" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#7a7a72" letter-spacing="1.5" class="mono">ZONE 4</text>
  <text x="792" y="100" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Institutional</text>
  <text x="792" y="114" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#0d0d0b" class="serif">Reliance</text>

  <!-- Audience rows -->
  <rect x="676" y="126" width="232" height="32" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="692" y="140" font-size="8.5" font-weight="bold" fill="#0d0d0b" class="serif">Boards</text>
  <text x="896" y="140" text-anchor="end" font-size="7.5" fill="#7a7a72" class="mono">Oversight signal</text>
  <text x="692" y="152" font-size="7" fill="#7a7a72" class="mono">s.180(1) duty of care · deployment approval</text>

  <rect x="676" y="162" width="232" height="32" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="692" y="176" font-size="8.5" font-weight="bold" fill="#0d0d0b" class="serif">Insurers</text>
  <text x="896" y="176" text-anchor="end" font-size="7.5" fill="#7a7a72" class="mono">Underwriting signal</text>
  <text x="692" y="188" font-size="7" fill="#7a7a72" class="mono">AE³ coverage · risk tier · D4 profile</text>

  <rect x="676" y="198" width="232" height="32" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="692" y="212" font-size="8.5" font-weight="bold" fill="#0d0d0b" class="serif">Investors</text>
  <text x="896" y="212" text-anchor="end" font-size="7.5" fill="#7a7a72" class="mono">Diligence signal</text>
  <text x="692" y="224" font-size="7" fill="#7a7a72" class="mono">Structural vs operational risk · D3, D4</text>

  <rect x="676" y="234" width="232" height="32" fill="#fdfaf5" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="692" y="248" font-size="8.5" font-weight="bold" fill="#0d0d0b" class="serif">Regulators</text>
  <text x="896" y="248" text-anchor="end" font-size="7.5" fill="#7a7a72" class="mono">Supervision signal</text>
  <text x="692" y="260" font-size="7" fill="#7a7a72" class="mono">EU AI Act · NIST · APRA CPS 230</text>

  <rect x="676" y="270" width="232" height="32" fill="white" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="692" y="284" font-size="8.5" font-weight="bold" fill="#0d0d0b" class="serif">Enterprise Procurement</text>
  <text x="896" y="284" text-anchor="end" font-size="7.5" fill="#7a7a72" class="mono">Vendor signal</text>
  <text x="692" y="296" font-size="7" fill="#7a7a72" class="mono">Vendor governance signal · adoption basis</text>

  <line x1="676" y1="312" x2="896" y2="312" stroke="#e8e4db" stroke-width="0.75"/>
  <text x="792" y="330" text-anchor="middle" font-size="7.5" fill="#3a3a35" class="mono">Institutional audiences do not</text>
  <text x="792" y="344" text-anchor="middle" font-size="7.5" fill="#3a3a35" class="mono">consume raw methodology.</text>
  <text x="792" y="360" text-anchor="middle" font-size="7.5" fill="#3a3a35" class="mono">They consume the signal.</text>
  <text x="792" y="378" text-anchor="middle" font-size="7" font-style="italic" fill="#A88644" class="mono">ASIC v Bekier [2026] FCA 196</text>

  <!-- ── BOTTOM CAPTION ── -->
  <line x1="40" y1="406" x2="920" y2="406" stroke="#d4d0c8" stroke-width="0.75"/>
  <text x="480" y="424" text-anchor="middle" font-size="9" fill="#3a3a35" font-style="italic" class="serif">The Governance Benchmark Index converts six-dimensional governance assessment into a comparable institutional signal.</text>
  <text x="480" y="439" text-anchor="middle" font-size="9" fill="#3a3a35" font-style="italic" class="serif">Certification communicates that signal in a form institutional audiences can rely upon without reproducing the full methodology.</text>
  <text x="480" y="460" text-anchor="middle" font-size="7.5" fill="#7a7a72" class="mono">Martin, C. Trust Architecture: Making Autonomous Systems Bankable · ARAF v3.0, 2026 · trust-architecture.com</text>

</svg>
